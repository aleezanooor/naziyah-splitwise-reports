name: Deploy Splitwise dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate latest Splitwise export when activity changes
        env:
          SPLITWISE_ACCESS_TOKEN: ${{ secrets.SPLITWISE_ACCESS_TOKEN }}
          SPLITWISE_EXPENSE_LIMIT: "500"
          PREVIOUS_EXPORT_URL: "https://aleezanooor.github.io/naziyah-splitwise-reports/splitwise-export.live.json"
        run: python3 connector/splitwise_live_export.py > docs/splitwise-export.live.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
